apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: default
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root123456
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-user
  namespace: default
  labels:
    app: mysql-user
    business: user
    role: database
    runtime: mysql
    runtime-profile: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-user
  template:
    metadata:
      labels:
        app: mysql-user
    spec:
      containers:
        - name: mysql
          image: mysql:8
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-user
  namespace: default
  labels:
    app: mysql-user
    business: user
    role: database
    runtime: mysql
spec:
  type: ClusterIP
  selector:
    app: mysql-user
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
